version: '3.8'

services:
  # Database Services
  postgres:
    image: postgres:15
    container_name: agenticomics-postgres
    environment:
      POSTGRES_DB: agenticomics
      POSTGRES_USER: agenticomics
      POSTGRES_PASSWORD: agenticomics_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - agenticomics-network

  redis:
    image: redis:7-alpine
    container_name: agenticomics-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agenticomics-network

  mongodb:
    image: mongo:6
    container_name: agenticomics-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: agenticomics
      MONGO_INITDB_ROOT_PASSWORD: agenticomics_password
      MONGO_INITDB_DATABASE: agenticomics
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - agenticomics-network

  # Message Queue
  rabbitmq:
    image: rabbitmq:3-management
    container_name: agenticomics-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: agenticomics
      RABBITMQ_DEFAULT_PASS: agenticomics_password
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - agenticomics-network

  # Backend Services (Java)
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: agenticomics-api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DATABASE_URL=jdbc:postgresql://postgres:5432/agenticomics
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - agenticomics-network

  auth-service:
    build:
      context: ./backend/auth
      dockerfile: Dockerfile
    container_name: agenticomics-auth
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DATABASE_URL=jdbc:postgresql://postgres:5432/agenticomics
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - agenticomics-network

  data-management-service:
    build:
      context: ./backend/data-management
      dockerfile: Dockerfile
    container_name: agenticomics-data-management
    ports:
      - "8082:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DATABASE_URL=jdbc:postgresql://postgres:5432/agenticomics
      - MONGODB_URL=mongodb://agenticomics:agenticomics_password@mongodb:27017/agenticomics
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/processed:/app/data/processed
    depends_on:
      - postgres
      - mongodb
    networks:
      - agenticomics-network

  pipeline-engine-service:
    build:
      context: ./backend/pipeline-engine
      dockerfile: Dockerfile
    container_name: agenticomics-pipeline-engine
    ports:
      - "8083:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DATABASE_URL=jdbc:postgresql://postgres:5432/agenticomics
      - RABBITMQ_URL=amqp://agenticomics:agenticomics_password@rabbitmq:5672
    volumes:
      - ./data/pipelines:/app/data/pipelines
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - agenticomics-network

  # Python Services
  chat-agent:
    build:
      context: ./python-services/agents/chat-agent
      dockerfile: Dockerfile
    container_name: agenticomics-chat-agent
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://agenticomics:agenticomics_password@rabbitmq:5672
    depends_on:
      - redis
      - rabbitmq
    networks:
      - agenticomics-network

  pipeline-agent:
    build:
      context: ./python-services/agents/pipeline-agent
      dockerfile: Dockerfile
    container_name: agenticomics-pipeline-agent
    ports:
      - "8001:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://agenticomics:agenticomics_password@rabbitmq:5672
      - DATABASE_URL=postgresql://agenticomics:agenticomics_password@postgres:5432/agenticomics
    volumes:
      - ./data/pipelines:/app/data/pipelines
      - ./data/models:/app/data/models
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - agenticomics-network

  data-processor:
    build:
      context: ./python-services/data-processors
      dockerfile: Dockerfile
    container_name: agenticomics-data-processor
    environment:
      - RABBITMQ_URL=amqp://agenticomics:agenticomics_password@rabbitmq:5672
      - MONGODB_URL=mongodb://agenticomics:agenticomics_password@mongodb:27017/agenticomics
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/processed:/app/data/processed
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - agenticomics-network

  # Frontend
  web-app:
    build:
      context: ./frontend/web-app
      dockerfile: Dockerfile
    container_name: agenticomics-web-app
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8080
      - REACT_APP_WS_URL=ws://localhost:8080
    depends_on:
      - api-gateway
    networks:
      - agenticomics-network

  admin-panel:
    build:
      context: ./frontend/admin-panel
      dockerfile: Dockerfile
    container_name: agenticomics-admin-panel
    ports:
      - "3001:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8080
    depends_on:
      - api-gateway
    networks:
      - agenticomics-network

  # Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: agenticomics-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - agenticomics-network

  grafana:
    image: grafana/grafana:latest
    container_name: agenticomics-grafana
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - agenticomics-network

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

networks:
  agenticomics-network:
    driver: bridge
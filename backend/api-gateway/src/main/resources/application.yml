server:
  port: ${API_GATEWAY_PORT:8080}
  address: ${SERVER_ADDRESS:localhost}

spring:
  application:
    name: api-gateway
  profiles:
    active: dev
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  webflux:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:12000}
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://${SERVER_ADDRESS:localhost}:${AUTH_PORT:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=2
        - id: data-management-service
          uri: http://${SERVER_ADDRESS:localhost}:8082
          predicates:
            - Path=/api/data/**
        - id: pipeline-engine-service
          uri: http://${SERVER_ADDRESS:localhost}:8083
          predicates:
            - Path=/api/pipeline/**
        - id: notification-service
          uri: http://${SERVER_ADDRESS:localhost}:8084
          predicates:
            - Path=/api/notifications/**

eureka:
  client:
    enabled: false
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    com.agenticomics: DEBUG
    org.springframework.cloud.gateway: DEBUG
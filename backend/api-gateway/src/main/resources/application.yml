server:
  port: 8080

spring:
  application:
    name: api-gateway
  profiles:
    active: dev
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: data-management-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/data/**
        - id: pipeline-engine-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/pipeline/**
        - id: notification-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/notifications/**

eureka:
  client:
    enabled: false
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    com.agenticomics: DEBUG
    org.springframework.cloud.gateway: DEBUG
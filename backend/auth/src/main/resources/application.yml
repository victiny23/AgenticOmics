server:
  port: ${AUTH_PORT:8081}
  address: ${SERVER_ADDRESS:localhost}

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:h2:file:./data/auth-db
    username: sa
    password: password
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

logging:
  level:
    com.agenticomics: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE